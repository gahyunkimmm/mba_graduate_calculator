<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>연세 MBA 졸업이수 시뮬레이터</title>
<style>
:root{
  --blue:#4C72FF;--green:#1a7a1a;--red:#c0392b;
  --bg:#f8f9fa;--surface:#fff;--border:#dee2e6;
  --text:#212529;--muted:#6c757d;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── 고정 학점 바 ── */
#cb{position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:min(800px,calc(100vw - .5rem));z-index:200;
  background:var(--surface);border:1px solid var(--border);
  border-radius:0 0 10px 10px;padding:9px 16px;
  box-shadow:0 3px 10px rgba(0,0,0,.1)}
#cb-inner{display:flex;align-items:center;gap:10px}
#cb-prog{flex:1;min-width:0}
#cb-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
#cb-lbl-l{font-size:11px;color:var(--muted)}
#cb-lbl-r{font-weight:800;font-size:13px;color:var(--blue);white-space:nowrap}
#cb-track{background:#e9ecef;border-radius:4px;height:6px}
#cb-fill{height:100%;border-radius:4px;width:0%;background:var(--blue);transition:width .4s ease}
#cb-sep{width:1px;height:30px;background:var(--border);flex-shrink:0}
#cb-btn{font-size:11px;padding:6px 12px;border-radius:7px;border:none;
  background:#FF4B4B;color:#fff;cursor:pointer;font-weight:700;
  white-space:nowrap;flex-shrink:0}

/* ── 앱 컨테이너 ── */
#app{max-width:800px;margin:0 auto;padding:74px 14px 48px}

/* ── 네비게이션 ── */
.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.nav-btn{padding:9px 6px;border-radius:var(--r);border:2px solid var(--border);
  background:var(--surface);cursor:pointer;font-size:13px;font-weight:600;
  transition:all .15s;text-align:center}
.nav-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.nav-btn:not(.on):hover{border-color:var(--blue);color:var(--blue)}

/* ── 프로그램 선택 ── */
.prog-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.prog-btn{padding:8px;border-radius:var(--r);border:2px solid var(--border);
  background:var(--surface);cursor:pointer;font-size:14px;font-weight:700}
.prog-btn.on{border-color:var(--blue);color:var(--blue);background:#f0f4ff}

/* ── 학기 아코디언 ── */
details{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:9px}
summary{padding:11px 14px;cursor:pointer;list-style:none;
  display:flex;justify-content:space-between;align-items:center;gap:8px}
summary::-webkit-details-marker{display:none}
.sum-arrow{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0}
details[open] .sum-arrow{transform:rotate(180deg)}
.sem-body{padding:0 14px 14px}

/* ── 소제목 ── */
.sub-hd{font-size:11px;font-weight:700;color:#444;margin:10px 0 3px;
  padding-left:7px;border-left:3px solid var(--blue)}
.track-hd{font-size:11px;font-weight:600;color:#999;margin:7px 0 2px;
  padding-left:6px;border-left:2px solid #ddd}

/* ── 체크박스 행 ── */
.cr{display:flex;align-items:flex-start;gap:7px;padding:2px 0}
.cr input[type=checkbox]{margin-top:2px;flex-shrink:0;
  width:15px;height:15px;cursor:pointer;accent-color:var(--blue)}
.cr label{font-size:13px;cursor:pointer;line-height:1.4}
.cr.lk label{color:#bbb}
.cr input:disabled{cursor:not-allowed}

/* ── 요건 라디오 ── */
.count-as{margin:3px 0 2px 22px;display:flex;gap:14px;font-size:12px;color:#555}
.count-as label{display:flex;align-items:center;gap:4px;cursor:pointer}

/* ── 리포트 ── */
.grad-ok{background:#e8f5e9;border:2px solid #2e7d32;border-radius:10px;padding:14px 18px;margin:6px 0 14px}
.grad-ng{background:#fdf0f0;border:2px solid var(--red);border-radius:10px;padding:14px 18px;margin:6px 0 14px}
.grad-title{font-size:1.1rem;font-weight:800}
.grad-ok .grad-title{color:#1b5e20}
.grad-ng .grad-title{color:var(--red)}
.grad-sub{font-size:.84rem;margin-top:3px}
.grad-ok .grad-sub{color:#2e7d32}
.grad-ng .grad-sub{color:#888}

.mcards{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:14px 0}
.mc{background:#f8f9fa;border-radius:var(--r);padding:9px 4px;text-align:center}
.mc-lbl{font-size:10px;color:var(--muted);margin-bottom:2px;word-break:keep-all}
.mc-val{font-size:1.1rem;font-weight:800;color:var(--text);line-height:1.1}
.mc-sub{display:inline-block;border-radius:4px;padding:2px 5px;
  font-size:9.5px;font-weight:600;margin-top:3px;word-break:keep-all}
.mc-sub.ok{background:#f0faf0;color:var(--green)}
.mc-sub.ng{background:#fdf0f0;color:var(--red)}

.rr{border-radius:var(--r);padding:9px 13px;margin:4px 0}
.rr.ok{background:#f0faf0}
.rr.ng{background:#fdf0f0}
.rr-title{font-weight:600;font-size:14px}
.rr.ok .rr-title{color:var(--green)}
.rr.ng .rr-title{color:var(--red)}
.rr-detail{font-size:12px;color:#888;margin-top:3px;padding-left:18px}

.pw{background:#e9ecef;border-radius:4px;height:7px;margin:3px 0}
.pf{height:100%;border-radius:4px;background:var(--blue);transition:width .4s}

.conc-ok{background:#e8f5e9;border:2px solid #2e7d32;border-radius:9px;
  padding:11px 15px;margin:5px 0}
.conc-ok-t{font-weight:800;font-size:.95rem;color:#1b5e20}
.conc-ok-s{font-size:.83rem;color:#2e7d32;margin-top:2px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f9fa;padding:5px 7px;text-align:left;
  border-bottom:2px solid var(--border);font-weight:600}
td{padding:5px 7px;border-bottom:1px solid #f0f0f0}

/* ── 버튼 ── */
.btn{padding:10px 14px;border-radius:var(--r);border:none;cursor:pointer;
  font-size:13px;font-weight:600;width:100%;text-align:center}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:#3a5cd8}
.btn-d{background:#fdf0f0;border:1px solid var(--red);color:var(--red)}
.btn-d:hover{background:#fbe0e0}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.btn-full{margin:14px 0}

hr{border:none;border-top:1px solid var(--border);margin:14px 0}
h2{font-size:15px;font-weight:700;margin-bottom:10px}
.caption{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.55}

.hidden{display:none!important}

@media(max-width:560px){
  #app{padding:68px 10px 40px}
  .mcards{gap:4px}
  .mc{padding:7px 2px}
  .mc-val{font-size:.95rem}
  .mc-lbl,.mc-sub{font-size:9px}
  table{font-size:11px}
  .nav-btn,.btn{font-size:12px;padding:8px 4px}
}
</style>
</head>

<div id="cb">

</div>

// ── 상태 ─────────────────────────────────────────────────────────────────
let prog  = localStorage.getItem('prog')  || 'CMBA';
let taken = {};
try{ taken = JSON.parse(localStorage.getItem('taken')||'{}'); }catch(e){}

function save(){ localStorage.setItem('prog',prog); localStorage.setItem('taken',JSON.stringify(taken)); }

// ── Helpers ───────────────────────────────────────────────────────────────
const fc = n => n%1===0 ? String(n) : n.toFixed(1);

function stats(){
  let tot=0,eng=0,ld=0;
  for(const v of Object.values(taken)){
    tot+=v.credits;
    if(v.is_english)    eng+=v.credits;
    if(v.is_leadership) ld +=v.credits;
  }
  const rq   = MASTER.required[prog];
  const miss = rq.filter(c=>!taken[c.code]);
  return {tot,eng,ld,miss,rq};
}

// ── Credit bar ────────────────────────────────────────────────────────────
function updateBar(){
  const {tot} = stats();
  const rules = MASTER.graduation_rules[prog];
  const pct   = Math.min(tot/rules.total_credits*100,100);
  const color = tot>=rules.total_credits ? '#1a7a1a' : '#4C72FF';
  document.getElementById('cb-lbl-r').textContent = `${fc(tot)} / ${rules.total_credits} 학점`;
  document.getElementById('cb-lbl-r').style.color = color;
  document.getElementById('cb-fill').style.width  = pct+'%';
  document.getElementById('cb-fill').style.background = color;
}

// ── Navigation ────────────────────────────────────────────────────────────
let view = 'plan';
function goView(v){
  view = v;
  const isPlan = v==='plan';
  document.getElementById('v-plan')  .classList.toggle('hidden',!isPlan);
  document.getElementById('v-report').classList.toggle('hidden', isPlan);
  document.getElementById('cb')      .classList.toggle('hidden', !isPlan);
  document.getElementById('nb-plan')  .classList.toggle('on',isPlan);
  document.getElementById('nb-report').classList.toggle('on',!isPlan);

}

function setProg(p){
  prog=p;
  save();
  ['CMBA','FMBA'].forEach(x=>document.getElementById('pb-'+x).classList.toggle('on',x===p));
  renderPlan();
}

// ── elecMap: renderPlan 때 빌드, toggleElec에서 참조 ───────────────────
let elecMap={};

// ── Plan render ───────────────────────────────────────────────────────────
function renderPlan(){
  elecMap={};
  const reqSet = new Set(MASTER.required[prog].map(c=>c.code));
  const frags  = [];

  SEM_CFG[prog].forEach((sem,si)=>{
    const {label,rk,sn,reg}=sem;
    const semReq = MASTER.required[prog].filter(c=>rk.includes(c.semester));

    // 선택과목 풀
    let semElec=[];
    if(sn){
      semElec = Object.values(SE[sn]).filter(c=>!reqSet.has(c.code)).map(c=>({...c,semIdx:si,once:true}));
      if(sn==='여름') semElec.push({...CKJ,semIdx:si,once:true});
      semElec.push({...GST,semIdx:si,once:true}); // 여름/겨울 모든 계절학기
    } else {
      if(reg && RE[reg]) semElec = Object.values(RE[reg]).filter(c=>!reqSet.has(c.code)).map(c=>({...c,semIdx:si,once:true}));
      semElec.push(...LDR.map(lc=>({...lc,semIdx:si})));
    }

    if(!semReq.length && !semElec.length) return;

    const isHere = c => {
      const r=taken[c.code];
      if(!r) return false;
      return c.once ? r.sem_idx===si : true;
    };

    // 계절학기 학점 사용량
    let snCr = sn ? semElec.filter(c=>isHere(c)&&!CAP_EXEMPT.has(c.code)).reduce((s,c)=>s+taken[c.code].credits,0) : 0;

    // 이 학기 통계
    const cReq  = semReq.filter(c=>taken[c.code]).length;
    const cElec = semElec.filter(c=>isHere(c)).length;
    const crDone= semReq.filter(c=>taken[c.code]).reduce((s,c)=>s+taken[c.code].credits,0)
                + semElec.filter(c=>isHere(c)).reduce((s,c)=>s+taken[c.code].credits,0);
    const elecSfx = semElec.length ? ` + 선택 ${cElec}과목` : '';
    const stat    = `필수 ${cReq}/${semReq.length}${elecSfx} · ${fc(crDone)}학점`;

    // 트랙 버킷
    const bk={};
    for(const c of semElec){
      const tr = prog==='CMBA' ? c.cmba_track : c.fmba_track;
      const key = tr ? `심화 · ${tr}` : (c.is_leadership||c.is_english) ? '영어 / 리더십개발' : '기타 선택';
      if(!bk[key]) bk[key]=[];
      bk[key].push(c);
    }
    const tOrd = [...Object.keys(bk).filter(k=>k.startsWith('심화')).sort(),'영어 / 리더십개발','기타 선택'].filter(k=>bk[k]);

    let h=`<details open><summary>
  <span style="font-weight:600;font-size:13px">${label}</span>
  <span style="font-size:11px;color:#888;font-weight:400">${stat}</span>
  <span class="sum-arrow">▼</span>
</summary><div class="sem-body">`;

    // 필수
    if(semReq.length){
      h+=`<div class="sub-hd">📌 필수과목</div>`;
      for(const c of semReq){
        const id=`req_${c.code}`;
        const chk=taken[c.code]?'checked':'';
        h+=`<div class="cr"><input type="checkbox" id="${id}" ${chk} onchange="toggleReq('${c.code}','${c.name.replace(/'/g,"\\'")}',${c.credits})"><label for="${id}"><strong>${c.name}</strong> · ${c.credits}학점</label></div>`;
      }
    }

    // 선택
    if(semElec.length){
      if(sn){
        if(snCr>=CAP) h+=`<div class="sub-hd">🗂️ 선택과목 · ⚠️ 3.0학점 상한 도달</div>`;
        else          h+=`<div class="sub-hd">🗂️ 선택과목 · 잔여 ${fc(CAP-snCr)}학점</div>`;
      } else {
        h+=`<div class="sub-hd">🗂️ 선택과목</div>`;
      }

      for(const trLabel of tOrd){
        const cl=bk[trLabel];
        const cnt=cl.filter(c=>isHere(c)).length;
        h+=`<div class="track-hd">${trLabel} · ${cnt}/${cl.length}과목</div>`;

        // 최신 snCr 재계산
        snCr = sn ? semElec.filter(c=>isHere(c)&&!CAP_EXEMPT.has(c.code)).reduce((s,c)=>s+taken[c.code].credits,0) : 0;

        for(const c of cl){
          const mapKey=`elec_s${si}_${c.code}`;
          elecMap[mapKey]=c;

          const rec     = taken[c.code];
          const here    = isHere(c);
          const onceLk  = !!(c.once && rec && rec.sem_idx!==si);
          const capLk   = !!(sn && !CAP_EXEMPT.has(c.code) && !here && snCr+c.credits>CAP);
          const lk      = onceLk||capLk;

          let tag='';
          if(c.is_english&&c.is_leadership) tag='  (영어/리더십)';
          else if(c.is_english)              tag='  (영어강의)';
          else if(c.is_leadership)           tag='  (리더십개발)';

          h+=`<div class="cr${lk?' lk':''}">
<input type="checkbox" id="${mapKey}" ${here?'checked':''} ${lk?'disabled':''} ${!lk?`onchange="toggleElec('${mapKey}')"`:''}>
<label for="${mapKey}"><strong>${c.name}</strong> · ${c.credits}학점${tag}${lk?' 🔒':''}</label>
</div>`;

          // 영어+리더십 동시 해당시 라디오
          if(here && !lk && c.is_english && c.is_leadership){
            const asEng = rec&&rec.is_english ? 'checked':'';
            const asLd  = rec&&rec.is_leadership ? 'checked':'';
            h+=`<div class="count-as"><span>어느 요건?</span>
<label><input type="radio" name="as_${mapKey}" value="영어강의" ${asEng} onchange="setCountAs('${c.code}','영어강의')"> 영어강의</label>
<label><input type="radio" name="as_${mapKey}" value="리더십개발" ${asLd} onchange="setCountAs('${c.code}','리더십개발')"> 리더십개발</label>
</div>`;
          }
        }
      }
    }

    h+=`</div></details>`;
    frags.push(h);
  });

  document.getElementById('plan-body').innerHTML = frags.join('');
  updateBar();
}

// ── Toggle handlers ───────────────────────────────────────────────────────
function toggleReq(code,name,credits){
  const el=document.getElementById('req_'+code);
  if(el.checked) taken[code]={name,credits,kind:'필수',is_english:false,is_leadership:false};
  else if(taken[code]&&taken[code].kind==='필수') delete taken[code];
  save(); renderPlan();
}

function toggleElec(key){
  const c=elecMap[key];
  if(!c){ renderPlan(); return; }
  const el=document.getElementById(key);
  if(el.checked){
    taken[c.code]={
      name:c.name, credits:c.credits, kind:'선택',
      is_english:!!c.is_english, is_leadership:!!c.is_leadership,
      once:!!c.once, sem_idx:c.semIdx,
      cmba_track:c.cmba_track||null, fmba_track:c.fmba_track||null
    };
  } else {
    if(taken[c.code]&&taken[c.code].kind==='선택') delete taken[c.code];
  }
  save(); renderPlan();
}

function setCountAs(code,val){
  if(!taken[code]) return;
  taken[code].is_english    = (val==='영어강의');
  taken[code].is_leadership = (val==='리더십개발');
  save();
}

// ── Report render ─────────────────────────────────────────────────────────
function renderReport(){
  const rules=MASTER.graduation_rules[prog];
  const {tot,eng,ld,miss,rq}=stats();
  const ok=tot>=rules.total_credits && !miss.length && eng>=rules.english_credits && ld>=rules.leadership_credits;

  let h='';

  // 졸업 배너
  if(ok){
    h+=`<div class="grad-ok"><div class="grad-title">🎓 졸업 요건 충족!</div><div class="grad-sub">모든 졸업 요건을 충족했습니다.</div></div>`;
  } else {
    const iss=[];
    if(tot<rules.total_credits)       iss.push(`학점 ${fc(rules.total_credits-tot)}학점 부족`);
    if(miss.length)                   iss.push(`필수과목 ${miss.length}개 미이수`);
    if(eng<rules.english_credits)     iss.push(`영어강의 ${fc(rules.english_credits-eng)}학점 부족`);
    if(ld<rules.leadership_credits)   iss.push(`리더십개발 ${fc(rules.leadership_credits-ld)}학점 부족`);
    h+=`<div class="grad-ng"><div class="grad-title">❌ 졸업 요건 미충족</div><div class="grad-sub">미충족: ${iss.join(' · ')}</div></div>`;
  }

  // 메트릭 카드
  h+=`<div class="mcards">
<div class="mc"><div class="mc-lbl">총 이수학점</div><div class="mc-val">${fc(tot)}학점</div><div class="mc-sub ${tot>=rules.total_credits?'ok':'ng'}">목표 ${rules.total_credits}학점</div></div>
<div class="mc"><div class="mc-lbl">필수 미이수</div><div class="mc-val">${miss.length}과목</div><div class="mc-sub ${miss.length===0?'ok':'ng'}">${rq.length-miss.length}/${rq.length} 완료</div></div>
<div class="mc"><div class="mc-lbl">영어강의</div><div class="mc-val">${fc(eng)}학점</div><div class="mc-sub ${eng>=rules.english_credits?'ok':'ng'}">기준 ${rules.english_credits}학점</div></div>
<div class="mc"><div class="mc-lbl">리더십개발</div><div class="mc-val">${fc(ld)}학점</div><div class="mc-sub ${ld>=rules.leadership_credits?'ok':'ng'}">기준 ${rules.leadership_credits}학점</div></div>
</div>`;

  h+='<hr>';

  // 요건 행
  const rr=(ok2,t,d)=>`<div class="rr ${ok2?'ok':'ng'}"><div class="rr-title">${ok2?'✅':'❌'} ${t}</div>${d?`<div class="rr-detail">${d}</div>`:''}</div>`;
  h+=rr(tot>=rules.total_credits, `총 이수학점 ${fc(tot)} / ${rules.total_credits}학점`);
  h+=rr(miss.length===0, `필수과목 ${rq.length-miss.length}/${rq.length}과목 이수`, miss.length?'미이수: '+miss.map(c=>c.name).join(', '):'');
  h+=rr(eng>=rules.english_credits, `영어강의 ${fc(eng)} / ${rules.english_credits}학점`);
  h+=rr(ld>=rules.leadership_credits, `리더십개발 ${fc(ld)} / ${rules.leadership_credits}학점`);

  h+='<hr><h2>🎯 심화과정(Concentration)</h2>';

  // Concentration
  const ci=MASTER.concentration_index[prog];
  if(prog==='CMBA'){
    const conc={};
    for(const [code,v] of Object.entries(taken))
      for(const tr of (ci[code]||[])) conc[tr]=(conc[tr]||0)+v.credits;
    for(const tr of ['마케팅','매니지먼트','재무']){
      const cr=conc[tr]||0, ok2=cr>=rules.concentration_credits;
      if(ok2){
        h+=`<div class="conc-ok"><div class="conc-ok-t">🏆 ${tr} 심화과정 인정</div><div class="conc-ok-s">${fc(cr)} / ${rules.concentration_credits}학점 달성</div></div>`;
      } else {
        const pct=Math.min(cr/rules.concentration_credits*100,100);
        h+=`<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${tr}</span><span style="color:#666">${fc(cr)} / ${rules.concentration_credits}학점</span></div><div class="pw"><div class="pf" style="width:${pct}%"></div></div></div>`;
      }
    }
  } else {
    const sums={'금융공학':0,'자산운용/투자은행':0,'공통트랙':0};
    for(const [code,v] of Object.entries(taken))
      for(const tr of (ci[code]||[])) sums[tr]=(sums[tr]||0)+v.credits;
    for(const [tr,cr] of Object.entries(sums)){
      const pct=Math.min(cr/rules.concentration_credits*100,100);
      h+=`<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${tr}</span><span style="color:#666">${fc(cr)}학점</span></div><div class="pw"><div class="pf" style="width:${pct}%"></div></div></div>`;
    }
    const fe=sums['금융공학'],ib=sums['자산운용/투자은행'],cm=sums['공통트랙'];
    const ach=[];
    if(fe>=9) ach.push(`금융공학 (${fc(fe)}학점)`);
    else if(fe+cm>=9&&fe>0) ach.push(`금융공학 + 공통트랙 (${fc(fe+cm)}학점)`);
    if(ib+cm>=9&&ib>0) ach.push(`자산운용/투자은행 + 공통트랙 (${fc(ib+cm)}학점)`);
    for(const a of ach) h+=`<div class="conc-ok"><div class="conc-ok-t">🏆 심화과정 인정</div><div class="conc-ok-s">${a}</div></div>`;
    if(!ach.length) h+=`<p style="color:#888;font-size:13px;margin:6px 0">아직 인정 기준을 충족한 조합이 없습니다.</p>`;
    h+=`<p style="font-size:11px;color:#888;margin-top:8px">📖 ${MASTER.fmba_concentration_note}</p>`;
  }

  h+='<hr>';

  // 전체 과목 테이블
  const entries=Object.entries(taken);
  h+=`<details><summary style="font-weight:600;font-size:13px;padding:10px 0;cursor:pointer;list-style:none">📋 담은 과목 전체 보기 (${entries.length}과목 · ${fc(tot)}학점) ▾</summary>`;
  if(entries.length){
    h+=`<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th>학정번호</th><th>과목명</th><th>학점</th><th>종별</th><th>영어</th><th>리더십</th></tr></thead><tbody>`;
    for(const [code,v] of entries)
      h+=`<tr><td>${code}</td><td>${v.name}</td><td>${v.credits}</td><td>${v.kind||''}</td><td>${v.is_english?'✓':''}</td><td>${v.is_leadership?'✓':''}</td></tr>`;
    h+='</tbody></table></div>';
  } else {
    h+=`<p style="color:#888;font-size:13px;padding:6px 0">아직 담은 과목이 없습니다.</p>`;
  }
  h+='</details><hr>';

  // 하단 버튼
  h+=`<div class="btn-row">
<button class="btn btn-p" onclick="goView('plan')">← 이수계획으로 돌아가기</button>
<button class="btn btn-d" onclick="resetAll()">🗑️ 전체 초기화</button>
</div>`;

  document.getElementById('report-body').innerHTML=h;
}

// ── Reset ─────────────────────────────────────────────────────────────────
function resetAll(){
  if(!confirm('모든 이수 데이터를 초기화할까요?')) return;
  taken={}; save(); goView('plan');
}

// ── Init ──────────────────────────────────────────────────────────────────
['CMBA','FMBA'].forEach(p=>document.getElementById('pb-'+p).classList.toggle('on',p===prog));
goView('plan');
</script>
</body>
</html>
